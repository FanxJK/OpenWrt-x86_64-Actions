name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      clean_cache:
        description: 'Clean Cache'
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      upload_release:
        description: 'Upload Release'
        required: false
        type: choice
        options:
          - "true"
          - "false"
        default: "true"

env:
  REPO_NAME: immortalwrt/immortalwrt
  BUILD_VER: "25.12"
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  CUSTOM_FEEDS_SH: custom-feeds.sh
  CUSTOM_CONFIG_SH: custom-config.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: ${{ github.event.client_payload.upload_release || github.event.inputs.upload_release }}
  CLEAN_CACHE: ${{ github.event.client_payload.clean_cache || github.event.inputs.clean_cache }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: write

    steps:

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /etc/mysql /etc/php /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/share/boost /usr/local/graalvm /usr/local/share/powershell /usr/local/share/chromium
        sudo rm -rf /usr/local/lib/node_modules /opt/az /opt/microsoft /usr/share/swift
        sudo docker image prune --all --force
        sudo apt-get clean
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply \
          python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Checkout
      uses: actions/checkout@main

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        REPO_URL="https://github.com/$REPO_NAME.git"
        REPO_TAG=$(curl -H "Authorization: Bearer ${{ secrets.MY_SECRETS_TOKEN }}" \
        -sX GET "https://api.github.com/repos/$REPO_NAME/tags" | awk -F '"' '/name/{print $4}' | grep $BUILD_VER | head -n 1)
        echo "REPO_TAG=$REPO_TAG" >> $GITHUB_ENV
        echo "Build Version: $REPO_TAG"
        git clone $REPO_URL -b $REPO_TAG --single-branch openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        echo "After clone:"
        df -hT

    - name: Cache
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt
        clean: ${{ env.CLEAN_CACHE }}

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $CUSTOM_FEEDS_SH
        cd openwrt
        $GITHUB_WORKSPACE/$CUSTOM_FEEDS_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Re Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Add Github release Tag to firmware
      run: |
        cd openwrt
        BUILD_DATE=$(date +"%Y.%m.%d")
        echo "RELEASE_TAG=${{ env.REPO_TAG }}-$BUILD_DATE" >> $GITHUB_ENV
        echo "DISTRIB_GITHUBVER='${{ env.REPO_TAG }}-$BUILD_DATE'" >> package/base-files/files/etc/openwrt_release

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $CUSTOM_CONFIG_SH
        cd openwrt
        $GITHUB_WORKSPACE/$CUSTOM_CONFIG_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Free up space before compile
      run: |
        # Clean up unnecessary files to free space
        sudo apt-get clean
        sudo apt-get autoremove -y --purge
        sudo rm -rf /var/lib/apt/lists/*
        sudo rm -rf /tmp/* /var/tmp/*
        sudo rm -rf /var/log/*.log /var/log/*/*.log
        # Clean docker and containers
        sudo docker system prune -af --volumes
        # Clean snap cache if exists
        sudo rm -rf /var/lib/snapd/cache/* || true
        # Clean journal logs
        sudo journalctl --vacuum-time=1d || true
        # Remove unnecessary documentation and man pages
        sudo rm -rf /usr/share/doc/* /usr/share/man/* /usr/share/info/*
        # Show available space
        df -hT

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(($(nproc) + 1)) || make -j$(nproc) V=s || make -j1 V=s
        echo "COMPILE_STATUS=success" >> $GITHUB_ENV
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: ${{ env.COMPILE_STATUS == 'success' && env.UPLOAD_BIN_DIR == 'true' && !cancelled() }}
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: ${{ env.UPLOAD_FIRMWARE == 'true' && !cancelled() }}
      run: |
        set -e
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "ORGANIZE_STATUS=success" >> $GITHUB_ENV

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: ${{ env.ORGANIZE_STATUS == 'success' && !cancelled() }}
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Create release
      id: tag
      if: ${{ env.UPLOAD_RELEASE == 'true' && !cancelled() }}
      run: |
        echo "RELEASE_STATUS=success" >> $GITHUB_ENV

    - name: Upload firmware to release
      if: ${{ env.RELEASE_STATUS == 'success' && !cancelled() }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --notes-file "$GITHUB_WORKSPACE/.github/CHANGELOG.txt"
          gh release upload "$RELEASE_TAG" "$FIRMWARE"/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
        else
          gh release create "$RELEASE_TAG" "$FIRMWARE"/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TAG" \
            --notes-file "$GITHUB_WORKSPACE/.github/CHANGELOG.txt" \
            --target "$GITHUB_SHA"
        fi

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ github.token }}
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      if: ${{ env.UPLOAD_RELEASE == 'true' && !cancelled() }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,createdAt \
          --jq 'sort_by(.createdAt) | reverse | .[3:][] | .tagName' |
        while IFS= read -r tag_name; do
          [ -n "$tag_name" ] || continue
          echo "Deleting old release and tag: $tag_name"
          gh release delete "$tag_name" \
            --repo "$GITHUB_REPOSITORY" \
            --yes \
            --cleanup-tag
        done
